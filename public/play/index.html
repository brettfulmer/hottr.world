<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Elaine's Dancefloor World Tour</title>
<link rel="manifest" href="/play/manifest.json">
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ RESET ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#e2e2e2;font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased;touch-action:none;user-select:none;-webkit-user-select:none}

/* ═══ CANVAS ═══ */
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;background:transparent}

/* ═══ UI LAYER ═══ */
#ui{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10}
#ui.active{pointer-events:auto}

/* ═══ SCREENS ═══ */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem;width:100%;height:100%;position:relative;overflow:hidden}
.screen.visible{display:flex}

/* ═══ TYPOGRAPHY ═══ */
h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:0.02em}
h1{font-size:clamp(2rem,8vw,3.5rem);line-height:1.05;margin-bottom:0.5rem}
h2{font-size:clamp(1.5rem,6vw,2.5rem);line-height:1.1;margin-bottom:0.5rem}
h3{font-size:clamp(1rem,3.5vw,1.4rem);line-height:1.3;margin-bottom:0.25rem;font-weight:700}
.pink{color:#FF0CB6}
.white{color:#e2e2e2}
.muted{color:#919090;font-size:0.8rem}
.glow{text-shadow:0 0 30px rgba(255,12,182,0.5),0 0 80px rgba(255,12,182,0.15)}

/* ═══ BUTTONS ═══ */
.btn{
  pointer-events:auto;display:inline-flex;align-items:center;justify-content:center;
  padding:0.9rem 2.5rem;border:none;border-radius:4px;
  background:linear-gradient(135deg,#FF0CB6,#D4008E);color:#fff;
  font-family:'Sora',sans-serif;font-weight:600;font-size:0.95rem;
  cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;
  transition:transform 0.15s,box-shadow 0.2s;
  margin-top:1rem;min-width:200px;
  box-shadow:0 0 20px rgba(255,12,182,0.3);
  -webkit-tap-highlight-color:transparent
}
.btn:active{transform:scale(0.96);box-shadow:0 0 10px rgba(255,12,182,0.2)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.15);color:#e2e2e2;box-shadow:none}
.btn-outline:active{background:rgba(255,255,255,0.05)}

.subtitle{font-size:clamp(0.85rem,2.5vw,1rem);color:#919090;margin-bottom:0.75rem;font-weight:400}
.spacer{height:0.75rem}

/* ═══ SCORES ═══ */
.score-row{display:flex;justify-content:space-between;width:100%;max-width:300px;margin-top:0.4rem;font-size:0.9rem;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.score-row .rank{color:#919090;width:2rem}
.score-row .val{color:#FF0CB6;font-weight:600}

/* ═══ HUD ═══ */
#hud{position:absolute;top:0;left:0;width:100%;padding:max(env(safe-area-inset-top,12px),12px) 1rem 0;display:none;justify-content:space-between;align-items:flex-start;font-size:0.85rem;z-index:20;font-weight:500}
#hud.visible{display:flex}
#hud .lives{color:#FF0CB6;font-size:1.1rem;letter-spacing:2px}
#hud .level-name{color:#e2e2e2;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;text-align:center;line-height:1.3}
#hud .level-name .city{display:block;font-family:'Poppins',sans-serif;font-weight:900;font-size:0.8rem;color:#FF0CB6}
#hud .score-display{color:#e2e2e2;font-family:'Poppins',sans-serif;font-weight:900;font-size:1.1rem}

/* ═══ COMBO POPUP ═══ */
#comboPopup{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:25;pointer-events:none;font-family:'Poppins',sans-serif;font-weight:900;font-size:2rem;color:#FF0CB6;text-shadow:0 0 20px rgba(255,12,182,0.6);opacity:0;transition:none}
#comboPopup.show{animation:comboPop 0.8s ease-out forwards}
@keyframes comboPop{0%{opacity:1;transform:translate(-50%,-50%) scale(1.5)}40%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-70%) scale(0.8)}}

/* Elaine performer removed */

/* ═══ WELCOME — hero background ═══ */
#welcomeScreen{background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.9) 100%),url('/elaine_pink_nocopy.webp') center top/cover no-repeat;justify-content:flex-end;padding-bottom:max(env(safe-area-inset-bottom,2rem),2rem)}
#welcomeScreen .welcome-content{position:relative;z-index:2}

/* ═══ LEVEL INTRO ═══ */
#levelIntroScreen{background-size:cover;background-position:center;background-repeat:no-repeat}
.level-intro-img{width:min(180px,40vw);height:auto;filter:drop-shadow(0 0 30px rgba(255,12,182,0.4));margin-bottom:1rem}
.level-stop{font-family:'Sora',sans-serif;font-weight:600;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.25em;color:#FF0CB6;margin-bottom:0.5rem}
.level-city{font-family:'Poppins',sans-serif;font-weight:900;font-size:clamp(1.8rem,7vw,3rem);text-transform:uppercase;letter-spacing:-0.02em;color:#e2e2e2;line-height:1.05;margin-bottom:0.4rem}
.level-performing{font-family:'Sora',sans-serif;font-weight:500;font-size:0.85rem;color:#919090;margin-bottom:0.5rem}
.level-phrase{font-family:'Sora',sans-serif;font-weight:400;font-size:0.85rem;color:rgba(255,12,182,0.7);font-style:italic}

/* ═══ RESULTS SCREENS ═══ */
.result-screen{background:radial-gradient(ellipse at center,rgba(255,12,182,0.06) 0%,rgba(0,0,0,1) 70%)}
.result-img{width:min(140px,35vw);height:auto;filter:drop-shadow(0 0 25px rgba(255,12,182,0.4));margin-bottom:1rem}
.result-score{font-family:'Poppins',sans-serif;font-weight:900;font-size:clamp(1.5rem,5vw,2.2rem);color:#FF0CB6;margin:0.5rem 0}
.result-label{font-family:'Sora',sans-serif;font-weight:500;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.2em;color:#919090}

/* ═══ LYRIC BAR ═══ */
#lyricBar{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);z-index:22;pointer-events:none;font-family:'Poppins',sans-serif;font-weight:900;font-size:clamp(0.7rem,2.5vw,1rem);color:rgba(255,12,182,0.15);text-transform:uppercase;letter-spacing:0.08em;text-align:center;white-space:nowrap;transition:color 0.5s,text-shadow 0.5s}
#lyricBar.revealed{color:#FF0CB6;text-shadow:0 0 20px rgba(255,12,182,0.5)}

/* ═══ MUSIC TOGGLE ═══ */
#musicToggle{position:absolute;top:max(env(safe-area-inset-top,12px),12px);right:3.5rem;z-index:25;background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:1rem;width:32px;height:32px;border-radius:4px;cursor:pointer;display:none}
#musicToggle.visible{display:flex;align-items:center;justify-content:center}
#musicToggle.muted{opacity:0.3}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:0.6}50%{opacity:1}}
.fade-up{animation:fadeUp 0.6s ease-out}
.shimmer{animation:shimmer 2s ease-in-out infinite}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<!-- Combo popup -->
<div id="comboPopup"></div>

<!-- Lyric reveal bar -->
<div id="lyricBar"></div>

<!-- Music toggle -->
<button id="musicToggle" title="Toggle music">♫</button>

<!-- HUD -->
<div id="hud">
  <span class="lives" id="lives"></span>
  <span class="level-name" id="levelName"></span>
  <span class="score-display" id="scoreDisplay">0</span>
</div>

<div id="ui" class="active">
  <!-- WELCOME -->
  <div class="screen visible" id="welcomeScreen">
    <div class="welcome-content">
      <h1 class="glow" style="color:#fff;margin-bottom:0.25rem">Elaine's<br>Dancefloor<br><span class="pink">World Tour</span></h1>
      <p class="subtitle" style="color:rgba(255,255,255,0.6)">Break through to the stage in 50 cities. 5 tour legs. One Dancefloor.</p>
      <button class="btn shimmer" id="startBtn">Start Tour</button>
      <button class="btn btn-outline" id="scoresBtn" style="margin-top:0.75rem">Tour Scores</button>
    </div>
  </div>

  <!-- LEVEL INTRO -->
  <div class="screen" id="levelIntroScreen">
    <img class="level-intro-img" src="/elaine_transperant.webp" alt="Elaine">
    <div class="level-stop" id="levelNum"></div>
    <div class="level-city" id="levelCity"></div>
    <div class="level-performing" id="levelPerforming"></div>
    <div class="level-phrase" id="levelPhrase"></div>
    <button class="btn" id="levelGoBtn">Hit the Stage</button>
  </div>

  <!-- LEVEL COMPLETE -->
  <div class="screen result-screen" id="levelCompleteScreen">
    <img class="result-img" src="/elaine_pink.webp" alt="Elaine">
    <div class="result-label">Concert Complete</div>
    <h2 class="glow" id="completeLang"></h2>
    <div class="result-score" id="completeScore"></div>
    <p class="muted" style="margin-top:0.25rem">The crowd went wild.</p>
    <button class="btn" id="nextLevelBtn">Next City</button>
  </div>

  <!-- LEG COMPLETE -->
  <div class="screen result-screen" id="legCompleteScreen">
    <img class="result-img" src="/elaine_pink.webp" alt="Elaine" style="width:min(160px,40vw)">
    <div class="result-label" id="legCompleteName"></div>
    <h2 class="glow" id="legCompleteTitle"></h2>
    <div class="result-score" id="legCompleteScore"></div>
    <p class="muted" style="margin-top:0.5rem" id="legCompleteNext"></p>
    <button class="btn" id="legContinueBtn">Continue Tour</button>
  </div>

  <!-- GAME OVER -->
  <div class="screen result-screen" id="gameOverScreen">
    <img class="result-img" src="/elaine_transperant.webp" alt="Elaine" style="opacity:0.6">
    <div class="result-label">Tour Ended</div>
    <h2>Game Over</h2>
    <div class="result-score" id="gameOverScore"></div>
    <button class="btn" id="retryBtn">Try Again</button>
    <button class="btn btn-outline" id="goHomeBtn" style="margin-top:0.75rem">Menu</button>
  </div>

  <!-- WIN -->
  <div class="screen result-screen" id="winScreen">
    <img class="result-img" src="/elaine_pink.webp" alt="Elaine" style="width:min(160px,40vw)">
    <div class="result-label" style="margin-bottom:0.5rem">World Tour Complete</div>
    <h1 class="glow" style="font-size:clamp(1.4rem,5vw,2.5rem)">50 cities<span class="pink">.</span><br>50 crowds<span class="pink">.</span><br>One <span class="pink">Dancefloor</span><span class="pink">.</span></h1>
    <div class="result-score" id="winScore"></div>
    <button class="btn" id="winHomeBtn">Tour Again</button>
  </div>

  <!-- SCORES -->
  <div class="screen result-screen" id="scoresScreen">
    <h2>Tour Scores</h2>
    <div class="spacer"></div>
    <div id="scoresList"></div>
    <button class="btn btn-outline" id="scoresBackBtn">Back</button>
  </div>
</div>

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════ */
const PINK = '#FF0CB6';
const PINK_RGB = [255, 12, 182];
const BG = '#000000';
const PADDLE_H = 14;
const BALL_R = 8;
const BRICK_ROWS = 5;
const BASE_COLS = 8;
const MAX_LIVES = 3;

/* ═══════════════════════════════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════════════════════════════ */
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');

};

// ── MUSIC ──

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let W, H, dpr;
let state = 'welcome';
let currentLevel = 0;
let score = 0;
let lives = MAX_LIVES;
let combo = 0;
let maxCombo = 0;
let ball, paddle, bricks, brickCols, brickW, brickH, brickPadX, brickPadTop;
let ballTrail = [];
let hitParticles = [];
let bgSpots = [];
let ballLaunched = false;
let touchX = null;
let animFrame;
let comboTimer = null;
let lyricChars = []; // array of chars assigned to top-row bricks
let lyricRevealed = false;

/* ═══════════════════════════════════════════════════════════════
   SIZING
   ═══════════════════════════════════════════════════════════════ */
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  bgCanvas.width = canvas.width = W * dpr;
  bgCanvas.height = canvas.height = H * dpr;
  bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initBgSpots();
  if (state === 'playing') layoutBricks();
}
window.addEventListener('resize', resize);
resize();

/* ═══════════════════════════════════════════════════════════════
   DISCO BACKGROUND — mirror ball spots + dance floor grid
   ═══════════════════════════════════════════════════════════════ */
function initBgSpots() {
  bgSpots = [];
  const count = Math.min(25, Math.floor((W * H) / 30000));
  for (let i = 0; i < count; i++) {
    bgSpots.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
      size: 4 + Math.random() * 10,
      phase: Math.random() * Math.PI * 2,
      isPink: Math.random() > 0.5,
    });
  }
}

function drawBackground() {
  const t = Date.now() * 0.001;
  bgCtx.clearRect(0, 0, W, H);

  // Dance floor grid at bottom
  const floorY = H * 0.78;
  bgCtx.strokeStyle = 'rgba(255,12,182,0.03)';
  bgCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 35) { bgCtx.beginPath(); bgCtx.moveTo(x, floorY); bgCtx.lineTo(x, H); bgCtx.stroke(); }
  for (let y = floorY; y < H; y += 22) { bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke(); }

  // Sweeping spotlight
  const beamX = W / 2 + Math.sin(t * 0.4) * W * 0.35;
  const grd = bgCtx.createRadialGradient(beamX, -30, 0, beamX, H * 0.4, H * 0.7);
  grd.addColorStop(0, 'rgba(255,12,182,0.05)');
  grd.addColorStop(1, 'rgba(255,12,182,0)');
  bgCtx.fillStyle = grd;
  bgCtx.fillRect(0, 0, W, H);

  // Mirror ball spots
  for (const s of bgSpots) {
    s.x += s.vx; s.y += s.vy;
    if (s.x < -15) s.x = W + 15; if (s.x > W + 15) s.x = -15;
    if (s.y < -15) s.y = H + 15; if (s.y > H + 15) s.y = -15;
    const pulse = Math.sin(t * 1.8 + s.phase) * 0.5 + 0.5;
    const alpha = (0.03 + pulse * 0.06);
    bgCtx.fillStyle = s.isPink ? `rgba(255,12,182,${alpha})` : `rgba(255,255,255,${alpha * 0.5})`;
    bgCtx.fillRect(s.x - s.size/2, s.y - s.size * 0.35, s.size, s.size * 0.7);
  }
}

/* ═══════════════════════════════════════════════════════════════
   HIT PARTICLES — sparkle burst on brick break
   ═══════════════════════════════════════════════════════════════ */
function spawnHitParticles(x, y, color) {
  const count = 10 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    hitParticles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.02 + Math.random() * 0.02,
      size: 1.5 + Math.random() * 3, color,
      isSquare: Math.random() > 0.5 // mix of square + circle particles
    });
  }
}

function updateHitParticles() {
  for (let i = hitParticles.length - 1; i >= 0; i--) {
    const p = hitParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) hitParticles.splice(i, 1);
  }
}

function drawHitParticles() {
  for (const p of hitParticles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.isSquare) {
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

/* ═══════════════════════════════════════════════════════════════
   COMBO POPUP
   ═══════════════════════════════════════════════════════════════ */
function showCombo(n) {
  if (n < 3) return;
  comboPopup.textContent = `COMBO ×${n}`;
  comboPopup.classList.remove('show');
  void comboPopup.offsetWidth; // force reflow
  comboPopup.classList.add('show');
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => comboPopup.classList.remove('show'), 900);
}

/* ═══════════════════════════════════════════════════════════════
   BRICKS — disco floor tiles with arc layout
   ═══════════════════════════════════════════════════════════════ */
function layoutBricks() {
  brickCols = BASE_COLS + Math.floor(currentLevel / 3);
  const gap = 3;
  const totalPadX = 16;
  brickW = (W - totalPadX * 2 - gap * (brickCols - 1)) / brickCols;
  brickH = Math.max(16, Math.min(26, H * 0.028));
  brickPadX = totalPadX;
  brickPadTop = Math.max(55, H * 0.09);

  bricks = [];
  const centerX = W / 2;

  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < brickCols; c++) {
      const baseX = brickPadX + c * (brickW + gap);
      const baseY = brickPadTop + r * (brickH + gap);
      const dx = (baseX + brickW / 2 - centerX) / (W / 2);
      const arcOffset = Math.sqrt(Math.max(0, 1 - dx * dx)) * (H * 0.05) - (H * 0.05);
      const y = baseY - arcOffset * (1 - r / BRICK_ROWS * 0.5);
      const hp = (r < 1 && currentLevel > 5) ? 2 : 1;
      const extraHp = (currentLevel > 10 && r < 2) ? 1 : 0;

      bricks.push({ x: baseX, y, w: brickW, h: brickH, lit: false, hp: hp + extraHp, maxHp: hp + extraHp, row: r, col: c, char: '' });
    }
  }

  // Assign lyric characters to top row bricks
  const lvl = LEVELS[currentLevel];
  const lyric = lvl.lyric || '';
  lyricChars = lyric.split('');
  lyricRevealed = false;
  lyricBar.textContent = lyric;
  lyricBar.classList.remove('revealed');
  const topRow = bricks.filter(b => b.row === 0);
  for (let i = 0; i < topRow.length && i < lyricChars.length; i++) {
    topRow[i].char = lyricChars[i] || '';
  }
}

function drawBricks() {
  for (const b of bricks) {
    if (b.lit) {
      ctx.fillStyle = PINK;
      ctx.shadowColor = PINK;
      ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(b.x + 2, b.y + 1, b.w * 0.35, b.h * 0.3);
      ctx.shadowBlur = 0;
      // Lit lyric char — bright white
      if (b.char) {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.min(b.h - 4, 14)}px 'Poppins',sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(b.char, b.x + b.w / 2, b.y + b.h / 2);
      }
    } else {
      const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      const alpha = 0.35 + (b.hp / b.maxHp) * 0.4;
      grd.addColorStop(0, `rgba(45,45,55,${alpha})`);
      grd.addColorStop(1, `rgba(22,22,30,${alpha})`);
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5; ctx.stroke();
      if (b.hp < b.maxHp) {
        ctx.fillStyle = `rgba(255,12,182,${0.2 + ((b.maxHp - b.hp) / b.maxHp) * 0.35})`;
        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 2); ctx.fill();
      }
      // Unlit lyric char — barely visible hint
      if (b.char) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.font = `bold ${Math.min(b.h - 4, 14)}px 'Poppins',sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(b.char, b.x + b.w / 2, b.y + b.h / 2);
      }
    }
  }

  // Check if all top-row lyric bricks are lit → reveal the lyric
  if (!lyricRevealed) {
    const topRow = bricks.filter(b => b.row === 0);
    if (topRow.length > 0 && topRow.every(b => b.lit)) {
      lyricRevealed = true;
      lyricBar.classList.add('revealed');
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   PADDLE — chrome bar with pink glow
   ═══════════════════════════════════════════════════════════════ */
function initPaddle() {
  const pw = Math.min(110, W * 0.22);
  paddle = { x: W / 2 - pw / 2, y: H - 85, w: pw, h: PADDLE_H }; // higher so finger fits under
}

function drawPaddle() {
  const grd = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  grd.addColorStop(0, '#d0d0d0');
  grd.addColorStop(0.5, '#888');
  grd.addColorStop(1, '#444');
  ctx.fillStyle = grd;
  ctx.shadowColor = PINK;
  ctx.shadowBlur = 18;
  ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 3); ctx.fill();
  ctx.strokeStyle = PINK; ctx.lineWidth = 1; ctx.stroke();
  ctx.shadowBlur = 0;
}

/* ═══════════════════════════════════════════════════════════════
   BALL — disco chrome with pink trail
   ═══════════════════════════════════════════════════════════════ */
function initBall() {
  ballLaunched = false;
  ball = { x: paddle.x + paddle.w / 2, y: paddle.y - BALL_R - 2, vx: 0, vy: 0, r: BALL_R, speed: Math.min(4.5 + currentLevel * 0.25, 7.5) };
  ballTrail = [];
}

function launchBall() {
  if (ballLaunched) return;
  ballLaunched = true;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
  ball.vx = Math.cos(angle) * ball.speed;
  ball.vy = Math.sin(angle) * ball.speed;
}

function drawBall() {
  // Trail
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const alpha = (i / ballTrail.length) * 0.2;
    const sz = ball.r * (0.3 + (i / ballTrail.length) * 0.7);
    ctx.fillStyle = `rgba(255,12,182,${alpha})`;
    ctx.fillRect(t.x - sz, t.y - sz, sz * 2, sz * 2);
  }
  // Glow
  const grd = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 2);
  grd.addColorStop(0, 'rgba(255,255,255,0.7)');
  grd.addColorStop(0.4, 'rgba(255,12,182,0.3)');
  grd.addColorStop(1, 'rgba(255,12,182,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r * 2, 0, Math.PI * 2); ctx.fill();
  // Core
  const cg = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, 0, ball.x, ball.y, ball.r);
  cg.addColorStop(0, '#fff'); cg.addColorStop(0.5, '#bbb'); cg.addColorStop(1, '#666');
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = cg; ctx.shadowColor = PINK; ctx.shadowBlur = 10; ctx.fill(); ctx.shadowBlur = 0;
}

/* ═══════════════════════════════════════════════════════════════
   COLLISION
   ═══════════════════════════════════════════════════════════════ */
function collide() {
  if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
  if (ball.x + ball.r >= W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

  if (ball.y + ball.r >= H) {
    lives--; combo = 0;
    if (lives <= 0) { changeState('gameOver'); } else { initBall(); }
    return;
  }

  if (ball.vy > 0 && ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + ball.speed && ball.x >= paddle.x - ball.r && ball.x <= paddle.x + paddle.w + ball.r) {
    ball.y = paddle.y - ball.r;
    const hitPos = (ball.x - paddle.x) / paddle.w;
    const angle = -Math.PI * (0.15 + hitPos * 0.7);
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.vx = Math.cos(angle) * speed; ball.vy = Math.sin(angle) * speed;
    if (ball.vy > -1) ball.vy = -1;
    combo = 0;
  }

  for (const b of bricks) {
    if (b.lit) continue;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.hp--;
      if (b.hp <= 0) {
        b.lit = true; combo++; if (combo > maxCombo) maxCombo = combo;
        score += 10 * (currentLevel + 1) + combo * 5;
        spawnHitParticles(b.x + b.w / 2, b.y + b.h / 2, LEVELS[currentLevel].color);
        showCombo(combo);
      } else {
        spawnHitParticles(ball.x, ball.y, PINK);
      }
      const ol = ball.x + ball.r - b.x, or2 = b.x + b.w - (ball.x - ball.r);
      const ot = ball.y + ball.r - b.y, ob = b.y + b.h - (ball.y - ball.r);
      if (Math.min(ol, or2) < Math.min(ot, ob)) ball.vx = -ball.vx; else ball.vy = -ball.vy;
      break;
    }
  }

  if (bricks.every(b => b.lit)) changeState('levelComplete');
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOOP
   ═══════════════════════════════════════════════════════════════ */
function gameLoop() {
  animFrame = requestAnimationFrame(gameLoop);
  drawBackground();
  if (state !== 'playing') return;

  ctx.clearRect(0, 0, W, H);
  if (ballLaunched) { ballTrail.push({ x: ball.x, y: ball.y }); if (ballTrail.length > 12) ballTrail.shift(); }
  if (!ballLaunched) { ball.x = paddle.x + paddle.w / 2; ball.y = paddle.y - ball.r - 2; }
  else { ball.x += ball.vx; ball.y += ball.vy; collide(); }
  updateHitParticles();
  drawBricks(); drawPaddle();
  if (state === 'playing') drawBall();
  drawHitParticles();
  livesEl.textContent = '♥'.repeat(lives);
  scoreDisplayEl.textContent = score.toLocaleString();
}

/* ═══════════════════════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════════════════════ */
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('visible'));
  if (name && screens[name]) { screens[name].classList.add('visible'); ui.classList.add('active'); }
  else { ui.classList.remove('active'); }
}

function changeState(newState) {
  state = newState;
  ctx.clearRect(0, 0, W, H);
  hitParticles = []; ballTrail = [];
  
  switch (newState) {
    case 'welcome':
      hud.classList.remove('visible'); musicToggle.classList.remove('visible'); pauseMusic(); lyricBar.textContent = ''; document.body.style.backgroundImage = 'none'; showScreen('welcome'); break;

    case 'levelIntro': {
      hud.classList.remove('visible');
      const lvl = LEVELS[currentLevel];
      const leg = TOUR_LEGS[lvl.leg];
      document.getElementById('levelNum').textContent = `${leg.emoji} ${leg.name} — Stop ${currentLevel + 1} of ${LEVELS.length}`;
      document.getElementById('levelCity').textContent = lvl.city;
      document.getElementById('levelPerforming').textContent = `Performing in ${lvl.name}`;
      document.getElementById('levelPhrase').textContent = lvl.phrase;
      document.getElementById('levelIntroScreen').style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 100%), url('${lvl.bg}')`;
      showScreen('levelIntro');
      break;
    }

    case 'playing': {
      showScreen(null);
      hud.classList.add('visible');
      musicToggle.classList.add('visible');
      playMusic();
      const lvl = LEVELS[currentLevel];
      document.body.style.backgroundImage = `linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 40%, rgba(0,0,0,0.65) 100%), url('${lvl.bg}')`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      levelNameEl.innerHTML = `<span class="city">${lvl.city.split(',')[0]}</span>${lvl.name}`;
      initPaddle(); initBall(); layoutBricks();
      break;
    }

    case 'levelComplete': {
      pauseMusic();
      musicToggle.classList.remove('visible');
      lyricBar.textContent = '';
      const lv = LEVELS[currentLevel];
      document.getElementById('completeLang').textContent = lv.city;
      const lifeBonus = lives * 50 * (currentLevel + 1);
      score += lifeBonus;
      document.getElementById('completeScore').textContent = score.toLocaleString();
      if (currentLevel >= LEVELS.length - 1) { changeState('win'); return; }
      // Check if this is the last city in a tour leg
      const leg = TOUR_LEGS[lv.leg];
      if (currentLevel === leg.cities[1]) {
        changeState('legComplete'); return;
      }
      showScreen('levelComplete'); hud.classList.remove('visible');
      break;
    }

    case 'legComplete': {
      hud.classList.remove('visible');
      const lv = LEVELS[currentLevel];
      const leg = TOUR_LEGS[lv.leg];
      const nextLeg = TOUR_LEGS[lv.leg + 1];
      document.getElementById('legCompleteName').textContent = `${leg.emoji} ${leg.name} Complete`;
      document.getElementById('legCompleteTitle').textContent = `10 cities conquered`;
      document.getElementById('legCompleteScore').textContent = score.toLocaleString();
      document.getElementById('legCompleteNext').textContent = nextLeg ? `Next: ${nextLeg.emoji} ${nextLeg.name}` : 'Final stretch...';
      showScreen('legComplete');
      break;
    }

    case 'gameOver':
      hud.classList.remove('visible');
      document.getElementById('gameOverScore').textContent = score.toLocaleString();
      saveScore(score); showScreen('gameOver'); break;

    case 'win':
      hud.classList.remove('visible');
      document.getElementById('winScore').textContent = `Final Score: ${score.toLocaleString()}`;
      saveScore(score); showScreen('win'); break;

    case 'scores':
      hud.classList.remove('visible'); renderScores(); showScreen('scores'); break;
  }
}

/* ═══════════════════════════════════════════════════════════════
   SCORES
   ═══════════════════════════════════════════════════════════════ */
function getScores() { try { return JSON.parse(localStorage.getItem('dancefloor_breaker_scores') || '[]'); } catch { return []; } }
function saveScore(s) {
  const scores = getScores();
  scores.push({ score: s, date: new Date().toLocaleDateString(), level: currentLevel + 1 });
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem('dancefloor_breaker_scores', JSON.stringify(scores.slice(0, 10)));
}
function renderScores() {
  const list = document.getElementById('scoresList');
  const scores = getScores();
  if (!scores.length) { list.innerHTML = '<p class="muted" style="margin:1rem 0">No scores yet</p>'; return; }
  list.innerHTML = scores.map((s, i) => `<div class="score-row"><span class="rank">${i + 1}.</span><span>Stop ${s.level}</span><span class="val">${s.score.toLocaleString()}</span></div>`).join('');
}

/* ═══════════════════════════════════════════════════════════════
   INPUT
   ═══════════════════════════════════════════════════════════════ */
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchX = e.touches[0].clientX; if (state === 'playing' && !ballLaunched) launchBall(); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (state !== 'playing') return; const t = e.touches[0]; if (touchX !== null) { paddle.x += t.clientX - touchX; paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x)); } touchX = t.clientX; }, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; });
canvas.addEventListener('mousedown', () => { if (state === 'playing' && !ballLaunched) launchBall(); });
canvas.addEventListener('mousemove', e => { if (state !== 'playing') return; paddle.x = e.clientX - paddle.w / 2; paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x)); });
document.addEventListener('keydown', e => {
  if (state === 'playing') {
    if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); launchBall(); }
    if (e.key === 'ArrowLeft') { paddle.x -= 30; paddle.x = Math.max(0, paddle.x); }
    if (e.key === 'ArrowRight') { paddle.x += 30; paddle.x = Math.min(W - paddle.w, paddle.x); }
  }
});

/* ═══════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('startBtn').addEventListener('click', () => { currentLevel = 0; score = 0; lives = MAX_LIVES; combo = 0; maxCombo = 0; changeState('levelIntro'); });
document.getElementById('scoresBtn').addEventListener('click', () => changeState('scores'));
document.getElementById('scoresBackBtn').addEventListener('click', () => changeState('welcome'));
document.getElementById('levelGoBtn').addEventListener('click', () => changeState('playing'));
document.getElementById('nextLevelBtn').addEventListener('click', () => { currentLevel++; lives = Math.min(lives + 1, MAX_LIVES); changeState('levelIntro'); });
document.getElementById('legContinueBtn').addEventListener('click', () => { currentLevel++; lives = MAX_LIVES; changeState('levelIntro'); });
document.getElementById('retryBtn').addEventListener('click', () => { currentLevel = 0; score = 0; lives = MAX_LIVES; combo = 0; maxCombo = 0; changeState('levelIntro'); });
document.getElementById('goHomeBtn').addEventListener('click', () => changeState('welcome'));
document.getElementById('winHomeBtn').addEventListener('click', () => changeState('welcome'));

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
initBgSpots();
changeState('welcome');
gameLoop();

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/play/sw.js').catch(() => {}); }
</script>
</body>
</html>
